name: Flutter Build (Android + iOS)

# ──────────────────────────────────────────────
# Когда запускается:
#   - при каждом push в ветку main
#   - вручную через GitHub UI (Actions → Run workflow)
# ──────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build iOS IPA (slower, macOS runner)'
        type: boolean
        default: true
      build_android:
        description: 'Build Android APK + AAB'
        type: boolean
        default: true

# ══════════════════════════════════════════════
# JOB 1 — Android (APK + AAB)
# ══════════════════════════════════════════════
jobs:
  android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    # При push — всегда; при ручном запуске — только если выбрано build_android
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.build_android)

    steps:
      # ── 1. Код ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Кеш pub ──────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 3. Кеш Gradle ───────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Java 21 ──────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 5. Flutter ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 6. Зависимости ──────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 7. Анализ ───────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Сборка APK ───────────────────────────────
      - name: Build APK (release)
        run: flutter build apk --release --build-name="1.0.${{ github.run_number }}" --build-number=${{ github.run_number }}

      # ── 9. Сборка AAB ───────────────────────────────
      - name: Build AAB (release)
        run: flutter build appbundle --release --build-name="1.0.${{ github.run_number }}" --build-number=${{ github.run_number }}

      # ── 10. Загрузить APK ───────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 11. Загрузить AAB ───────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30


